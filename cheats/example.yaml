# ZIGH cheat definition — example
# Place in ~/.config/zigh/cheats/

game: NieRAutomata
engine: generic
process: NieRAutomata.exe

locks:
  - name: hp
    address: "game.exe+0x0123ABC0"
    chain: [0x10, 0x20, 0x8]
    type: f32
    default: 9999

  - name: mp
    address: "game.exe+0x0123ABC0"
    chain: [0x10, 0x28, 0x8]
    type: f32
    default: 9999

  - name: gil
    address: "game.exe+0x04567890"
    type: u32
    default: 9999999

  - name: exp_multiplier
    address: "game.exe+0x00FF1234"
    chain: [0x40, 0x8]
    type: f32
    default: 2

remote_calls:
  - name: set_time_of_day
    address: "game.exe+0x00123456"
    args: [f32]

  - name: teleport
    address: "game.exe+0x00789012"
    args: [f32, f32, f32]
